# ─────────────────────────────────────────────────────────────────────────────
# Wildcard Tenant Subdomain Config
# Handles: tenant1.localhost, tenant2.localhost, *.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    server_name ~^(?<tenant>.+)\.localhost$;

    root /var/www/html/public;
    index index.php index.html;

    add_header X-Tenant $tenant;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    sendfile off;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param HTTPS $https if_not_empty;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # DEV: static asset cache off
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /var/log/nginx/tenant_access.log;
    error_log  /var/log/nginx/tenant_error.log;
}
